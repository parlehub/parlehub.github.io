<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="The page you are looking for could not be found." />
  <title>404 — Page Not Found | ParleHub</title>
  <link rel="stylesheet" href="/css/style.css" />
  <style>
    .error-page {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: calc(100vh - 64px - 100px);
      text-align: center;
      padding: 2rem;
    }

    .error-page__code {
      font-size: clamp(5rem, 20vw, 10rem);
      font-weight: 800;
      line-height: 1;
      color: var(--color-primary);
      letter-spacing: -0.05em;
      opacity: 0.15;
      margin-bottom: -1.5rem;
    }

    .error-page__title {
      font-size: clamp(1.5rem, 4vw, 2.25rem);
      font-weight: 700;
      margin-bottom: 1rem;
    }

    .error-page__body {
      font-size: 1.125rem;
      color: var(--color-text-muted);
      max-width: 440px;
      margin-bottom: 2rem;
    }
  </style>
</head>
<body>
  <header class="site-header">
    <nav class="nav container">
      <a class="nav__logo" href="/">ParleHub</a>
    </nav>
  </header>

  <main>
    <div class="error-page">
      <p class="error-page__code" aria-hidden="true">404</p>
      <h1 class="error-page__title">Page Not Found</h1>
      <p class="error-page__body">
        The page you are looking for might have been moved, renamed, or doesn't exist.
      </p>
      <a href="/" class="btn btn--primary">Go Back Home</a>
    </div>
  </main>

  <footer class="site-footer">
    <div class="container footer__inner">
      <p class="footer__brand">ParleHub</p>
      <p class="footer__copy">&copy; <span id="year"></span> ParleHub. All rights reserved.</p>
    </div>
  </footer>

  <script src="/js/main.js"></script>
</body>
</html>
